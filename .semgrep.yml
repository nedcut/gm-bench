rules:
  # These four rules preserve the pinned upstream definitions and IDs. The
  # pattern-not clauses are narrow, reviewed exceptions to false positives.
  - id: python.lang.security.audit.dynamic-urllib-use-detected.dynamic-urllib-use-detected
    patterns:
      - pattern-not: urllib.$W("...")
      - pattern-not: urllib.request.$W("...")
      - pattern-not: $OPENER.$W("...")
      - pattern-not: urllib.request.urlopen(request, timeout=timeout)
      - pattern-either:
          - pattern: urllib.urlopen(...)
          - pattern: urllib.request.urlopen(...)
          - pattern: urllib.urlretrieve(...)
          - pattern: urllib.request.urlretrieve(...)
          - patterns:
              - pattern-either:
                  - pattern-inside: |
                      $OPENER = urllib.URLopener(...)
                      ...
                  - pattern-inside: |
                      $OPENER = urllib.request.URLopener(...)
                      ...
                  - pattern-inside: |
                      $OPENER = urllib.FancyURLopener(...)
                      ...
                  - pattern-inside: |
                      $OPENER = urllib.request.FancyURLopener(...)
                      ...
              - pattern-either:
                  - pattern: $OPENER.open(...)
                  - pattern: $OPENER.retrieve(...)
    message: >-
      Detected a dynamic value being used with urllib. urllib supports 'file://'
      schemes, so audit uses to ensure user data cannot control the URL.
    severity: WARNING
    languages: [python]

  - id: python.lang.security.audit.formatted-sql-query.formatted-sql-query
    message: Detected possible formatted SQL query. Use parameterized queries instead.
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: $DB.execute("..." % ...)
          - pattern: $DB.execute("...".format(...))
          - pattern: $DB.execute(f"...")
          - patterns:
              - pattern-either:
                  - pattern-inside: |
                      $SQL = "..." % ...
                      ...
                  - pattern-inside: |
                      $SQL = "...".format(...)
                      ...
                  - pattern-inside: |
                      $SQL = f"...{$X}..."
                      ...
              - pattern: $DB.execute($SQL)
      - pattern-not: connection.execute(f"ALTER TABLE episodes ADD COLUMN {name} {column_type}")

  - id: python.sqlalchemy.security.sqlalchemy-execute-raw-query.sqlalchemy-execute-raw-query
    message: Avoid formatted raw SQL; use bound parameters or SQLAlchemy expressions.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: $CONNECTION.execute($SQL + ..., ...)
          - pattern: $CONNECTION.execute($SQL % (...), ...)
          - pattern: $CONNECTION.execute($SQL.format(...), ...)
          - pattern: $CONNECTION.execute(f"...{...}...", ...)
          - patterns:
              - pattern-inside: |
                  $QUERY = $SQL + ...
                  ...
              - pattern: $CONNECTION.execute($QUERY, ...)
          - patterns:
              - pattern-inside: |
                  $QUERY = $SQL % (...)
                  ...
              - pattern: $CONNECTION.execute($QUERY, ...)
          - patterns:
              - pattern-inside: |
                  $QUERY = $SQL.format(...)
                  ...
              - pattern: $CONNECTION.execute($QUERY, ...)
          - patterns:
              - pattern-inside: |
                  $QUERY = f"...{...}..."
                  ...
              - pattern: $CONNECTION.execute($QUERY, ...)
      - pattern-not: connection.execute(f"ALTER TABLE episodes ADD COLUMN {name} {column_type}")

  - id: html.security.audit.missing-integrity.missing-integrity
    patterns:
      - pattern-either:
          - pattern: <script $...A >...</script>
          - pattern: <link $...A >
      - metavariable-pattern:
          metavariable: $...A
          patterns:
            - pattern-either:
                - pattern: src='... :// ...'
                - pattern: src="... :// ..."
                - pattern: href='... :// ...'
                - pattern: href="... :// ..."
                - pattern: src='//...'
                - pattern: src="//..."
                - pattern: href='//...'
                - pattern: href="//..."
            - pattern-not-regex: (?is).*integrity=.*
            - pattern-not-regex: (google-analytics\.com|fonts\.googleapis\.com|fonts\.gstatic\.com|googletagmanager\.com)
            - pattern-not-regex: .*rel\s*=\s*['"]?preconnect.*
            # Canonical metadata identifies the document; it fetches no resource.
            - pattern-not-regex: .*rel\s*=\s*['"]?canonical.*
    paths:
      include:
        - "*.html"
    message: >-
      This tag is missing an 'integrity' subresource integrity attribute. The
      'integrity' attribute allows for the browser to verify that externally hosted
      files (for example from a CDN) are delivered without unexpected manipulation.
      Without this attribute, if an attacker can modify the externally hosted resource,
      this could lead to XSS and other types of attacks. To prevent this, include the
      base64-encoded cryptographic hash of the resource (file) you're telling the
      browser to fetch in the 'integrity' attribute for all externally hosted files.
    severity: WARNING
    languages: [generic]
