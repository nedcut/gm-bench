name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build

  benchmark-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run validity canaries
        run: python -m gm_bench validate-contract
      - name: Validate committed leaderboard results
        run: |
          count=0
          while IFS= read -r -d '' result; do
            python -m gm_bench validate-result "$result" --policy sota-v2
            count=$((count + 1))
          done < <(find results/leaderboard -maxdepth 1 -type f -name '*.json' -print0)
          echo "validated $count current leaderboard result(s)"
      - name: Enforce compact publication artifacts
        run: |
          while IFS= read -r -d '' result; do
            python - "$result" <<'PY'
          import json, pathlib, sys
          path = pathlib.Path(sys.argv[1])
          payload = json.loads(path.read_text())
          publication = payload.get("publication") or {}
          assert publication.get("format") == "gm-bench-result-summary-v1", f"{path}: run compact-result before committing"
          assert publication.get("traces_included") is False, f"{path}: traces must not be committed"
          assert path.stat().st_size < 1_000_000, f"{path}: artifact exceeds 1 MB"
          for bucket in (payload.get("candidate"), *(payload.get("baselines") or [])):
              if not isinstance(bucket, dict):
                  continue
              for episode in bucket.get("episodes") or []:
                  assert "transactions" not in episode, f"{path}: episode traces must not be committed"
                  assert "season_summaries" not in episode, f"{path}: season summaries must not be committed"
                  usage = episode.get("usage")
                  if isinstance(usage, dict):
                      assert "per_decision" not in usage, f"{path}: per_decision usage must not be committed"
          PY
          done < <(find results/leaderboard -maxdepth 1 -type f -name '*.json' -print0)
      - name: Output-budget analysis is reproducible
        # Publishing keys off analysis.status; regenerate from the committed
        # sweep config (+ optional cell artifacts) and refuse hand-edited status.
        run: |
          mapfile -d '' cells < <(find results/analysis/output-budget-cells -type f -name '*.json' -print0 2>/dev/null || true)
          python scripts/analyze_output_budget.py "${cells[@]}" --output /tmp/output-budget-sweep.regen.json
          if ! diff -u results/analysis/output-budget-sweep.json /tmp/output-budget-sweep.regen.json; then
            echo "::error::results/analysis/output-budget-sweep.json is stale or hand-edited; re-run scripts/analyze_output_budget.py and commit the result"
            exit 1
          fi
      - name: Verify archived v1 evidence
        # `archive-v1` asserts these are authentic v1 artifacts on the frozen
        # contract. It deliberately does NOT assert they were leaderboard-eligible
        # -- they are evidence of the v1 scout-contract break, not a ranking.
        run: |
          count=0
          while IFS= read -r -d '' result; do
            python -m gm_bench validate-result "$result" --policy archive-v1
            count=$((count + 1))
          done < <(find results/leaderboard/archive-v1 -maxdepth 1 -type f -name '*.json' -print0)
          if [ "$count" -eq 0 ]; then
            echo "::error::no archived v1 evidence found; the archive must stay verifiable"
            exit 1
          fi
          echo "verified $count archived v1 artifact(s)"
      - name: Leaderboard site data is reproducible from committed artifacts
        # Guards against site data built from untracked local files: the committed
        # leaderboard.json must be exactly what the builder emits from this tree.
        run: |
          python web/scripts/build_leaderboard.py
          if ! git diff --exit-code -- web/src/data/leaderboard.json; then
            echo "::error::web/src/data/leaderboard.json is stale or was built from artifacts that are not committed; re-run python web/scripts/build_leaderboard.py and commit the result"
            exit 1
          fi
