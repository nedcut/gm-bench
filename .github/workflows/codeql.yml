name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Upload analysis results to the code-scanning dashboard.
      security-events: write
      # Read the workflow run metadata CodeQL needs for its "actions" analysis.
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript, actions]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          category: "/language:${{ matrix.language }}"
