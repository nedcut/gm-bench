name: Semgrep CE scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep/scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Publish scan results to the code-scanning dashboard.
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: pip install "semgrep==1.170.0"
      - name: Run Semgrep
        # Findings are surfaced in the Security tab rather than blocking CI;
        # promote to blocking once the baseline is triaged.
        continue-on-error: true
        run: semgrep scan --config auto --sarif --output=semgrep.sarif
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
