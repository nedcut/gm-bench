name: Semgrep CE scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep/scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Publish scan results to the code-scanning dashboard.
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: pip install "semgrep==1.170.0"
      - name: Run Semgrep
        # Findings are surfaced in the Security tab rather than blocking CI;
        # promote to blocking once the baseline is triaged.
        continue-on-error: true
        run: semgrep scan --config auto --sarif --output=semgrep.sarif
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
